#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries (DuckDB v1.4.5 LTS)
    # extension-ci-tools has no v1.4.5 tag; use the rolling v1.4 LTS branch (andium).
    # It carries the Windows-2025 fixes (force MSVC `cl`) required to link DuckDB
    # v1.4.5's newer vcpkg OpenSSL (slh_dsa MSVC intrinsics) under the vs2019comp triplet.
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.4-andium
    with:
      duckdb_version: v1.4.5
      ci_tools_version: v1.4-andium
      extension_name: anofox_similarity

  duckdb-v154-build:
    name: Build extension binaries (DuckDB v1.5.4)
    # extension-ci-tools has no v1.5.4 branch yet; pin to latest in the v1.5 line (v1.5.3)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.3
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5.3
      extension_name: anofox_similarity

